<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ngọc Rồng NCD - Chọn Máy Chủ</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.75);
            --primary-sv1: #00ffcc;
            --primary-sv2: #ff3366;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Hiệu ứng nền bụi sao lấp lánh */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/black-thread.png');
            opacity: 0.3;
            z-index: -1;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        .logo-container h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ff9900, #ff5500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(255,85,0,0.5));
        }

        .logo-container p {
            font-size: 0.9rem;
            color: #8a8a9e;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Container bao quanh 2 Server */
        .server-wrapper {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 950px;
            justify-content: center;
        }

        /* Khung Server chung */
        .server-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng viền phát sáng riêng cho từng SV */
        .server-card.sv1 {
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.05);
        }
        .server-card.sv1:hover {
            transform: translateY(-10px);
            border-color: var(--primary-sv1);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.2);
        }

        .server-card.sv2 {
            box-shadow: 0 10px 30px rgba(ff, 33, 102, 0.05);
        }
        .server-card.sv2:hover {
            transform: translateY(-10px);
            border-color: var(--primary-sv2);
            box-shadow: 0 15px 40px rgba(ff, 33, 102, 0.2);
        }

        /* Header của Card */
        .server-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .sv1 .server-tag { background: rgba(0, 255, 204, 0.1); color: var(--primary-sv1); }
        .sv2 .server-tag { background: rgba(255, 33, 102, 0.1); color: var(--primary-sv2); }

        .server-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .server-status {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 30px;
            color: #a0a0b0;
        }
        .server-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .sv1 .dot { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .sv2 .dot { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }

        /* Khối chứa nút */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Thiết kế nút chung */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        /* Nút Trang Chủ SV1 */
        .btn-home-sv1 {
            background: linear-gradient(135deg, #00ffcc 0%, #00b3ff 100%);
            color: #050510;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        .btn-home-sv1:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.5);
        }

        /* Nút Cộng Đồng SV1 */
        .btn-community-sv1 {
            background: rgba(255, 255, 255, 0.03);
            color: #00ffcc;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        .btn-community-sv1:hover {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
        }

        /* Nút Trang Chủ SV2 (Bị khóa/Tạm tắt) */
        .btn-home-sv2-disabled {
            background: #2a2a35;
            color: #666677;
            border: 1px dashed #444455;
            position: relative;
        }
        .btn-home-sv2-disabled i.lock-icon {
            color: #ff3366;
        }

        /* Nút Cộng Đồng SV2 */
        .btn-community-sv2 {
            background: rgba(255, 255, 255, 0.03);
            color: #ff3366;
            border: 1px solid rgba(255, 33, 102, 0.3);
        }
        .btn-community-sv2:hover {
            background: rgba(255, 33, 102, 0.1);
            border-color: #ff3366;
        }

        /* Hiệu ứng Toast thông báo */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }

        .toast {
            background: rgba(20, 20, 30, 0.95);
            border-left: 4px solid #ffaa00;
            color: #fff;
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease forwards;
            backdrop-filter: blur(5px);
        }

        /* Responsive mượt mà trên Mobile */
        @media (max-width: 768px) {
            .server-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .server-card {
                max-width: 100%;
            }
            .logo-container h1 {
                font-size: 2rem;
            }
            #toast-container {
                left: 20px;
                right: 20px;
                bottom: 20px;
            }
        }

        /* Keyframes Animation */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    </head>
    <body>

        <div class="logo-container">
            <h1>NGỌC RỒNG NCD</h1>
            <p>HỆ THỐNG MÁY CHỦ TRÒ CHƠI</p>
        </div>

        <div class="server-wrapper">

            <div class="server-card sv1">
                <span class="server-tag">SERVER 1</span>
                <h2 class="server-title">SERVER 1</h2>
                <div class="server-status">
                    <span class="dot"></span> Đang hoạt động
                </div>

                <div class="btn-group">
                    <a href="https://sv1.nroncd.online"
                        class="btn btn-home-sv1">
                        <i class="fa-solid fa-house"></i> Vào Trang Chủ Server 1
                    </a>
                    <a href="https://zalo.me/g/hxcfwn534" target="_blank"
                        class="btn btn-community-sv1">
                        <i class="fa-solid fa-comments"></i> Box Zalo 1
                    </a>
                    <a href="https://zalo.me/g/xpbuey914" target="_blank"
                        class="btn btn-community-sv1">
                        <i class="fa-solid fa-comments"></i> Box Zalo 2
                    </a>
                </div>
            </div>

            <div class="server-card sv2">
                <span class="server-tag">SERVER 2</span>
                <h2 class="server-title">SERVER 2</h2>
                <div class="server-status">
                    <span class="dot"></span> Sắp ra mắt thử nghiệm
                </div>

                <div class="btn-group">
                    <button class="btn btn-home-sv2-disabled"
                        onclick="showSv2Alert()">
                        <i class="fa-solid fa-lock lock-icon"></i> Vào Trang Chủ
                        Server 2
                        (Chờ ra mắt)
                    </button>
                    <a href="https://zalo.me/g/asipuw133" target="_blank"
                        class="btn btn-community-sv2">
                        <i class="fa-solid fa-comments"></i> Box Zalo Server 2
                        [Box 1]
                    </a>
                    <a href="https://zalo.me/g/acxvjw835" target="_blank"
                        class="btn btn-community-sv2">
                        <i class="fa-solid fa-comments"></i> Box Zalo Server 2
                        [Box 2]
                    </a>
                    <a href="https://zalo.me/g/yxxgnn344" target="_blank"
                        class="btn btn-community-sv2">
                        <i class="fa-solid fa-comments"></i> Box Zalo Server 2
                        [Box 3]
                    </a>
                </div>
            </div>

        </div>

        <div id="toast-container"></div>

        <script>
        function showSv2Alert() {
            const container = document.getElementById('toast-container');
            
            // Xóa thông báo cũ nếu có để tránh đè chồng dữ liệu
            container.innerHTML = '';

            // Tạo cấu trúc thông báo xịn xò
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <i class="fa-solid fa-triangle-exclamation" style="color: #ffaa00; font-size: 1.2rem;"></i>
                <div>
                    <strong>Thông báo:</strong> Vui lòng tham gia Cộng đồng và chờ ngày ra mắt chính thức Server 2!
                </div>
            `;

            container.appendChild(toast);

            // Tự động biến mất sau 4 giây hành động
            setTimeout(() => {
                toast.style.animation = 'fadeInDown 0.3s ease reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>

    </body>
</html>
