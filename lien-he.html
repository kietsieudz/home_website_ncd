<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ & Cộng đồng</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .admin-section { display: flex; justify-content: space-around; margin: 20px 0; }
        .admin-card { text-decoration: none; color: #333; display: flex; flex-direction: column; align-items: center; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #0084ff; }
        .name { margin-top: 10px; font-weight: bold; }
        .community-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-link { display: block; background: #0084ff; color: white; padding: 12px; margin: 10px 0; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .btn-link:hover { background: #0073e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>Liên hệ Admin</h2>
    <div class="admin-section">
        <a href="https://zalo.me/so_dien_thoai_1" class="admin-card">
            <img src="link_anh_avatar_1.jpg" alt="Admin 1" class="avatar">
            <span class="name">Tên Admin 1</span>
        </a>
        
        <a href="https://zalo.me/so_dien_thoai_2" class="admin-card">
            <img src="link_anh_avatar_2.jpg" alt="Admin 2" class="avatar">
            <span class="name">Tên Admin 2</span>
        </a>
    </div>

    <div class="community-section">
        <h3>Cộng đồng Zalo</h3>
        <a href="link_nhom_zalo_1" class="btn-link">Tham gia Nhóm Zalo 1</a>
        <a href="link_nhom_zalo_2" class="btn-link">Tham gia Nhóm Zalo 2</a>
    </div>
</div>

</body>
</html>
